name: 📚 Auto-Update OPDS Catalog

on:
  push:
    paths:
      - 'books/**'          # শুধু books/ ফোল্ডারে পরিবর্তন হলেই চলবে
  workflow_dispatch:         # GitHub থেকে হাতেও চালানো যাবে

permissions:
  contents: write

jobs:
  build-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install pymupdf

      - name: ⚙️ Generate OPDS index.xml
        run: python generate_catalog.py

      - name: 💾 Commit & Push index.xml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.xml
          git diff --cached --quiet \
            && echo "কোনো পরিবর্তন নেই, commit বাদ।" \
            || (git commit -m "🔄 Auto-update OPDS catalog [skip ci]" && git push)
